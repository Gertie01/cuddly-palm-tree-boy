name: Auto-manage large files and sync to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  manage-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Install dependencies
        run: |
          pip install huggingface_hub git-filter-repo

      - name: Detect large files (>10MB)
        id: detect
        run: |
          echo "Scanning for large files..."
          LARGE_FILES=$(find . -type f -size +10M -not -path "./.git/*" || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$LARGE_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload large files to HF Dataset
        if: steps.detect.outputs.files != ''
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Uploading large files to dataset..."
          mkdir -p hf_upload
          echo "${{ steps.detect.outputs.files }}" | while read file; do
            if [ -n "$file" ]; then
              cp "$file" hf_upload/
            fi
          done

          python - <<EOF
from huggingface_hub import HfApi, upload_folder
api = HfApi()
api.create_repo(
    repo_id="Gertie2013/cuddly-palm-tree-boy-assets",
    repo_type="dataset",
    exist_ok=True,
    token="${{ secrets.HF_TOKEN }}"
)
upload_folder(
    repo_id="Gertie2013/cuddly-palm-tree-boy-assets",
    repo_type="dataset",
    folder_path="hf_upload",
    token="${{ secrets.HF_TOKEN }}"
)
print("Upload complete.")
EOF

      - name: Remove large files from git history
        if: steps.detect.outputs.files != ''
        run: |
          echo "${{ steps.detect.outputs.files }}" | while read file; do
            if [ -n "$file" ]; then
              git rm --cached "$file" --force || true
            fi
          done

      - name: Update gitignore
        if: steps.detect.outputs.files != ''
        run: |
          echo "${{ steps.detect.outputs.files }}" >> .gitignore
          git add .gitignore

      - name: Commit changes
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git commit -m "Remove large files and update gitignore" || echo "No changes to commit"

      - name: Push to GitHub
        run: git push origin main

      - name: Sync to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://user:${{ env.HF_TOKEN }}@huggingface.co/spaces/Gertie2013/cuddly-palm-tree-boy
          git push space main:main --force
