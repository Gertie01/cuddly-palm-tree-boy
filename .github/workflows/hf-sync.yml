name: Sync to Hugging Face Space (with auto LFS)

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Git LFS
        run: git lfs install

      - name: Auto-detect and track large files (>10MB)
        run: |
          echo "Scanning for files larger than 10MB..."
          LARGE_FILES=$(find . -type f -size +10M | grep -v ".git" || true)

          if [ -n "$LARGE_FILES" ]; then
            echo "Large files found:"
            echo "$LARGE_FILES"

            for file in $LARGE_FILES; do
              echo "Tracking $file with Git LFS"
              git lfs track "$file"
            done

            git add .gitattributes
            git add $LARGE_FILES
            git commit -m "Auto-track large files with Git LFS" || echo "No changes to commit"
          else
            echo "No large files found."
          fi

      - name: Configure Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://user:$HF_TOKEN@huggingface.co/spaces/Gertie2013/cuddly-palm-tree-boy
          git push space main:main --force
