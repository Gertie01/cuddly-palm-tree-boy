name: Sync to HuggingFace Space

on:
  push:
    branches: [ "main" ]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history (fixes shallow clone)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Git LFS
        run: |
          git lfs install

      - name: Configure HuggingFace credentials
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Add HuggingFace remote
        run: |
          git remote add space https://Gertie2013:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Gertie2013/cuddly-palm-tree-boy

      - name: Push to HuggingFace Space
        run: |
          git push space main --force
